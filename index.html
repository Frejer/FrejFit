<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FrejFit MVP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>FrejFit</h1>
        <p>Build a personalized training plan and track your progress month by month.</p>
      </header>

      <section class="card">
        <h2>1) Workout onboarding</h2>
        <form id="onboarding-form" class="stack">
          <fieldset>
            <legend>Where do you train?</legend>
            <label><input type="radio" name="trainingLocation" value="home" required /> Home</label>
            <label><input type="radio" name="trainingLocation" value="gym" required /> Gym</label>
          </fieldset>

          <fieldset>
            <legend>Available equipment</legend>
            <div class="equipment-grid">
              <label><input type="checkbox" name="equipment" value="body weight" /> Body weight</label>
              <label><input type="checkbox" name="equipment" value="dumbbell" /> Dumbbell</label>
              <label><input type="checkbox" name="equipment" value="barbell" /> Barbell</label>
              <label><input type="checkbox" name="equipment" value="bench" /> Bench</label>
              <label><input type="checkbox" name="equipment" value="resistance band" /> Resistance band</label>
              <label><input type="checkbox" name="equipment" value="pull-up bar" /> Pull-up bar</label>
              <label><input type="checkbox" name="equipment" value="kettlebell" /> Kettlebell</label>
              <label><input type="checkbox" name="equipment" value="cable" /> Cable machine</label>
            </div>
          </fieldset>

          <div class="stats-grid">
            <label>Weight (kg)
              <input type="number" name="weight" min="20" max="400" step="0.1" required />
            </label>
            <label>Height (cm)
              <input type="number" name="height" min="100" max="250" step="0.1" required />
            </label>
            <label>Age
              <input type="number" name="age" min="10" max="100" required />
            </label>
          </div>

          <button type="submit">Generate training plan</button>
          <p id="onboarding-message" class="message" aria-live="polite"></p>
        </form>
      </section>

      <section class="card">
        <h2>2) Your generated plan</h2>
        <div id="plan-container" class="stack"></div>
      </section>

      <section class="card">
        <h2>3) Progress tracking</h2>
        <form id="progress-form" class="stack">
          <label>Month
            <input type="month" id="progress-month" required />
          </label>
          <label>Progress photo
            <input type="file" id="progress-photo" accept="image/*" required />
          </label>
          <button type="submit">Upload monthly photo</button>
          <p id="progress-message" class="message" aria-live="polite"></p>
        </form>

        <h3>Monthly photo history</h3>
        <div id="photo-history" class="photo-grid"></div>

        <h3>Stats history</h3>
        <div id="stats-history" class="history-table"></div>
      </section>

      <section class="card">
        <h2>4) Exercise tutorials (GIFs)</h2>
        <p>Curated from the <a href="https://github.com/hasaneyldrm/exercises-dataset" target="_blank" rel="noreferrer">exercises-dataset</a>.</p>
        <label>Search exercises
          <input type="search" id="exercise-search" placeholder="e.g. squat, pull-up, press" />
        </label>
        <div id="exercise-library" class="exercise-grid"></div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
